<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER DETAIL LAB</title>


<style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100vh;
      margin: 0;
      width: 100vw;
    }

    main {
      display: flex;
      flex-direction: row;
      padding: 15px;
      max-height: 90vh;
    }

    body {
      display: flex;
      flex-direction: column;
      background-color: gainsboro;
    }

    nav {
      background-color: blueviolet;
      flex-grow: 1;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }


    main {
      display: flex;
      flex-direction: row;
      padding: 15px;
      flex-grow: 10;
    }

    #master {
      flex-grow: 1;
      background-color: white;
      height: 100%;
      border-right: 1px solid black;
      max-height: 100%;
      overflow-y: scroll;
    }

    #detail {
      flex-grow: 6;
      height: 100%;
      text-align: center;
      padding: 20px;
      background-color: white;

    }

    li{
      list-style-type: none;
      border: 1px solid black;
      padding: 10px;
     
    }
    li:hover {
      background-color: #9c9c9c;
    }

    nav>h1 {
      flex: 1;
      text-align: center;
      color: white;
      margin: 0;
      padding: 10px 0;
    }
    </style>
    </head>



<body>
  <nav>
    <H1>MASTER DETAIL LAB</H1>
  </nav>

<main>
<section id="master">
<ul id="list" >
</ul>
</section>

<section id="detail">
    <h1>Click on an item to see details</h1>
    </section>

</main>

</body>
<script>

let poke_data = [];

function renderList(data) {

    let html = '';
    let result = document.querySelector('#list');

    for (let rec of data) {
      html += `<li onclick="select('${rec.name}')">
        <img src="${rec.image}"style="height:20px; width:20px"></img>
         <a>${rec.name}</a>
        </li>
      `;
    }


    result.innerHTML = html;
  }


async function fetchData() {
  let response = await fetch(`https://weblabs.web.app/data/amiibo.json`);
  let data = await response.json();
  poke_data = data.amiibo;
  renderList(poke_data);
}

function findRecord(name){
  for(let rec of poke_data){
    if (rec.name == name)
      return rec;
  }
  return null;
}
function select(name) {
  let result = document.querySelector('#detail');
  let data = findRecord(name);
  let html = `
      <h1>${data.name}</h1>
      <img src="${data.image}" style="height:200px; width:200px"></img>
      <h2>Series: ${data.amiiboSeries}</h2>
      <h2>Type: ${data.type}</h2>
    `;

    result.innerHTML = html;
  }




fetchData();
</script>

</html>
